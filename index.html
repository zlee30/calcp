<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Katculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="calc">
    <img src="kalculator.png" alt="Pink pixel-art heart calculator">

    <div class="screen">
      <div class="expr"><span id="expr"></span></div>
      <div class="result" id="result">0</div>
    </div>

    <button class="key rect" data-key="C" aria-label="clear" style="left:6.38%; top:30.64%; width:19.83%; height:11.37%"></button>
    <button class="key rect" data-key="()" aria-label="parentheses" style="left:29.11%; top:30.64%; width:19.92%; height:11.37%"></button>
    <button class="key rect" data-key="back" aria-label="backspace" style="left:51.93%; top:30.57%; width:19.63%; height:11.44%"></button>
    <button class="key rect" data-key="/" aria-label="divide" style="left:74.27%; top:30.64%; width:19.83%; height:11.37%"></button>

    <button class="key heart" data-key="7" aria-label="7" style="left:6.38%; top:43.52%; width:19.73%; height:11.9%"></button>
    <button class="key heart" data-key="8" aria-label="8" style="left:29.11%; top:43.52%; width:19.83%; height:11.9%"></button>
    <button class="key heart" data-key="9" aria-label="9" style="left:51.74%; top:43.52%; width:19.73%; height:11.83%"></button>
    <button class="key rect" data-key="*" aria-label="multiply" style="left:74.27%; top:43.52%; width:19.83%; height:11.44%"></button>

    <button class="key heart" data-key="4" aria-label="4" style="left:6.38%; top:56.34%; width:19.73%; height:11.83%"></button>
    <button class="key heart" data-key="5" aria-label="5" style="left:29.11%; top:56.34%; width:19.83%; height:11.77%"></button>
    <button class="key heart" data-key="6" aria-label="6" style="left:51.74%; top:56.34%; width:19.63%; height:11.77%"></button>
    <button class="key rect" data-key="-" aria-label="minus" style="left:74.27%; top:56.34%; width:19.83%; height:11.57%"></button>

    <button class="key heart" data-key="1" aria-label="1" style="left:6.38%; top:69.23%; width:19.73%; height:11.51%"></button>
    <button class="key heart" data-key="2" aria-label="2" style="left:29.11%; top:69.23%; width:19.83%; height:11.51%"></button>
    <button class="key heart" data-key="3" aria-label="3" style="left:51.74%; top:69.23%; width:19.63%; height:11.51%"></button>
    <button class="key rect" data-key="+" aria-label="plus" style="left:74.27%; top:69.3%; width:19.83%; height:11.44%"></button>

    <button class="key rect" data-key="%" aria-label="percent" style="left:6.38%; top:82.51%; width:19.83%; height:11.44%"></button>
    <button class="key rect" data-key="0" aria-label="0" style="left:29.11%; top:82.51%; width:19.92%; height:11.51%"></button>
    <button class="key rect" data-key="." aria-label="decimal" style="left:51.93%; top:82.51%; width:19.63%; height:11.44%"></button>
    <button class="key rect" data-key="=" aria-label="equals" style="left:74.27%; top:82.51%; width:19.83%; height:11.51%"></button>
  </div>

  <script src="script.js"></script>
</body>
</html>
